services:
  nginx:
    restart: always
    build: ./requirements/nginx/.
    container_name: nginx
    ports:
      - 443:443
    volumes:
      - /home/ziko/data/web:/var/www/html
    networks:
      inception:
  wordpress:
    restart: always
    build: ./requirements/wordpress/.
    container_name: wp-php
    volumes:
      - /home/ziko/data/web:/var/www/html
    networks:
      inception:

  mariadb:
    restart: always
    build: ./requirements/mariadb/.
    container_name: mariadb
      # - /home/ziko/data/db:/var/www/html
    networks:
      inception:

networks:
  inception: