services:
  nginx:
    restart: always
    build: ./requirements/nginx/.
    container_name: nginx
    image: nginx:1337
    ports:
      - 443:443
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception
    env_file:
      - path : .env
        required: true
  
  wordpress:
    restart: always
    build: ./requirements/wordpress/.
    container_name: wordpress
    image: wordpress:1337
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception
    env_file:
      - path : .env
        required: true

  mariadb:
    restart: always
    build: ./requirements/mariadb/.
    container_name: mariadb
    image: mariadb:1337
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    env_file:
      - path : .env
        required: true

  redis:
    restart: always
    build: ./requirements/bonus/redis/.
    container_name: redis
    image: redis:1337
    networks:
      - inception
    env_file:
      - path : .env
        required: true

  adminer:
    restart: always
    build: ./requirements/bonus/adminer/.
    container_name: adminer
    image: adminer:1337
    ports:
      - 8080:8080
    networks:
      - inception
    env_file:
      - path : .env
        required: true

  static-website:
    restart: always
    build: ./requirements/bonus/static-website/.
    container_name: static-website
    image: static-website:1337
    ports:
      - 80:80
    networks:
      - inception
    env_file:
      - path : .env
        required: true
  ftp:
    restart: always
    build: ./requirements/bonus/ftp-server/.
    container_name: ftp
    image: ftp:1337
    ports:
      - 21:21
      - 30000-30009:30000-30009
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception
    env_file:
      - path : .env
        required: true

  backup:
    restart: always
    build: ./requirements/bonus/backup/.
    container_name: backup
    image: backup:1337
    volumes:
      - db_backups:/backups
    networks:
      - inception
    env_file:
      - path : .env
        required: true

networks:
  inception:
    driver: bridge

volumes:
  wordpress_files:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/web'

  mariadb_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/db'

  db_backups:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/backups'